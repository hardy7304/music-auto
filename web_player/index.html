<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURORA | Professional AI Audio Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="glass-bg"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="brand-icon"></div>
                <h1>Aurora Audio</h1>
            </div>
            <div class="header-tag">ZHANG JIAHAO | PREMIUM</div>
        </header>

        <main>
            <section class="player-section">
                <div class="album-cover" id="current-cover"></div>
                
                <div class="song-info">
                    <h2 id="current-title">載入中...</h2>
                    <p class="producer-info">
                        PRODUCER <span class="gold-text">張嘉豪</span> 
                        <span class="sub-text">柔手運動按摩 & 柔手傳統整復推拿</span>
                    </p>
                    <p class="engine-info">AURORA AI V9 HIGH-FIDELITY ENGINE</p>
                </div>

                <div class="player-controls">
                    <div class="progress-container">
                        <span id="current-time">00:00</span>
                        <!-- 改用原生 Range Input，徹底解決跳轉問題 -->
                        <input type="range" id="seek-slider" class="seek-slider" min="0" max="100" value="0">
                        <span id="total-duration">00:00</span>
                    </div>

                    <div class="buttons">
                        <button class="ctrl-btn" id="prev-btn" title="上一首">
                            <i class="fas fa-step-backward"></i>
                        </button>
                        <button class="play-btn" id="play-btn" title="播放/暫停">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="ctrl-btn" id="next-btn" title="下一首">
                            <i class="fas fa-step-forward"></i>
                        </button>
                    </div>

                    <div class="download-row" id="download-row" style="display:none;">
                        <button class="download-btn" id="download-btn" title="下載 MP3">
                            <i class="fas fa-download"></i>
                            <span>下載 MP3</span>
                        </button>
                        <span class="download-hint" id="download-hint"></span>
                    </div>
                </div>
            </section>

            <section class="lyrics-section">
                <div class="section-header">
                    <h3><i class="fas fa-align-left"></i> LYRICS</h3>
                </div>
                <div class="lyrics-wrapper" id="lyrics-container">
                    <!-- 歌詞內容 -->
                </div>
            </section>

            <section class="playlist-section">
                <div class="section-header">
                    <h3><i class="fas fa-list"></i> PLAYLIST</h3>
                    <span class="count-tag" id="song-count">0 SONGS</span>
                </div>
                <div class="playlist-wrapper" id="playlist-container">
                    <!-- 歌曲清單 -->
                </div>
            </section>
        </main>
    </div>

    <audio id="audio-element"></audio>

    <script src="index.js"></script>
</body>
</html>
